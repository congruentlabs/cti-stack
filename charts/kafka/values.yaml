kafka:
  version: "3.8.0"
  replicas: 1
  storage:
    type: persistent-claim
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 3Gi
  config:
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    default.replication.factor: 1
    min.insync.replicas: 1
    log.retention.hours: 168
    auto.create.topics.enable: "false"
    message.max.bytes: 4194352
    compression.type: snappy

topics:
  - name: azul-jobs
    partitions: 6
    replicas: 1
  - name: azul-results
    partitions: 6
    replicas: 1
  - name: azul-notifications
    partitions: 3
    replicas: 1

certificate:
  issuerName: cti-ca-issuer

networkPolicy:
  enabled: true
