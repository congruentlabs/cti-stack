{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cti-postgresql
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: {{ .Values.cluster.name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        ## Allow from Keycloak (cti-infra only)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cti-infra
      ports:
        - port: 5432
          protocol: TCP
  egress:
    ## Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    ## Allow replication between PostgreSQL pods
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.cluster.name }}
      ports:
        - port: 5432
          protocol: TCP
{{- end }}
