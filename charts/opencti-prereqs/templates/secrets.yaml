  use-ssl: {{ .Values.secrets.minio.useSsl | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: opencti-oidc-credentials
  labels:
    app.kubernetes.io/name: opencti
    app.kubernetes.io/part-of: cti-stack
type: Opaque
stringData:
