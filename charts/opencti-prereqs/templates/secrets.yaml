apiVersion: v1
kind: Secret
metadata:
  name: opencti-credentials
  labels:
    app.kubernetes.io/name: opencti
    app.kubernetes.io/part-of: cti-stack
type: Opaque
stringData:
  admin-email: {{ .Values.secrets.admin.email | quote }}
  admin-password: {{ .Values.secrets.admin.password | quote }}
  admin-token: {{ .Values.secrets.admin.token | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: opencti-opensearch-credentials
  labels:
    app.kubernetes.io/name: opencti
    app.kubernetes.io/part-of: cti-stack
type: Opaque
stringData:
  url: {{ .Values.secrets.opensearch.url | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: opencti-rabbitmq-credentials
  labels:
    app.kubernetes.io/name: opencti
    app.kubernetes.io/part-of: cti-stack
type: Opaque
stringData:
  hostname: {{ .Values.secrets.rabbitmq.hostname | quote }}
  port: {{ .Values.secrets.rabbitmq.port | quote }}
  username: {{ .Values.secrets.rabbitmq.username | quote }}
  password: {{ .Values.secrets.rabbitmq.password | quote }}
  management-port: {{ .Values.secrets.rabbitmq.managementPort | quote }}
  ssl: {{ .Values.secrets.rabbitmq.ssl | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: opencti-redis-credentials
  labels:
    app.kubernetes.io/name: opencti
