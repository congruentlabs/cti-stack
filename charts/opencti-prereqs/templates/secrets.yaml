  password: {{ .Values.secrets.redis.password | quote }}
  ssl: {{ .Values.secrets.redis.ssl | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: opencti-minio-credentials
  labels:
    app.kubernetes.io/name: opencti
    app.kubernetes.io/part-of: cti-stack
type: Opaque
stringData:
  endpoint: {{ .Values.secrets.minio.endpoint | quote }}
  port: {{ .Values.secrets.minio.port | quote }}
  access-key: {{ .Values.secrets.minio.accessKey | quote }}
