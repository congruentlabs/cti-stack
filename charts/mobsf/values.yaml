global:
  baseDomain: cti.local
  storageClass: ""
  clusterIssuer: cti-ca-issuer

image:
  repository: opensecurity/mobile-security-framework-mobsf
  ## ISM-1443: Pin to digest. Update with: docker buildx imagetools inspect opensecurity/mobile-security-framework-mobsf:v4.1.3
  tag: "v4.1.3"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 2Gi

djangoq:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: cti-ca-issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
  hosts:
    - host: mobsf.cti.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mobsf-tls
      hosts:
        - mobsf.cti.local

  externalTls:
    enabled: false
    secretName: ""

persistence:
  enabled: true
  size: 20Gi
  storageClass: ""
  accessMode: ReadWriteOnce

postgresql:
  host: mobsf-postgresql-rw.cti-mobsf.svc
  port: "5432"
  database: mobsf
  existingSecret: mobsf-postgresql-credentials

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: cti-stack
      ports:
        - port: 8000
          protocol: TCP
