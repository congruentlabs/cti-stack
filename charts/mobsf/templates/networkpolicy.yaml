{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mobsf.fullname" . }}
  labels:
    app.kubernetes.io/name: mobsf
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mobsf
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        ## Allow from ingress controller (cti-infra)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cti-infra
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
  egress:
    ## Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    ## Allow communication to cti-infra namespace (PostgreSQL, Keycloak)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cti-infra
      ports:
        - port: 5432
          protocol: TCP
        - port: 8080
          protocol: TCP
    ## Allow communication within the namespace
    - to:
        - podSelector: {}
{{- end }}
