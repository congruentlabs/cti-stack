{{- if .Values.djangoq.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mobsf.fullname" . }}-djangoq
  labels:
    app.kubernetes.io/name: mobsf-djangoq
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: cti-stack
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.djangoq.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mobsf-djangoq
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mobsf-djangoq
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: cti-mobsf
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 9901
        runAsGroup: 9901
        fsGroup: 9901
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: djangoq
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "manage.py", "qcluster"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: MOBSF_DB_TYPE
              value: postgres
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: port
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: password
            - name: MOBSF_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mobsf-credentials
                  key: secret-key
          volumeMounts:
            - name: data
              mountPath: /home/mobsf/.MobSF
          resources:
            {{- toYaml .Values.djangoq.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "mobsf.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
