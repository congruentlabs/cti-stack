## RKE2 profile: Longhorn storage, HPA enabled, higher resources, full plugins

storageClassName: longhorn

api:
  replicas: 2
  resources:
    requests:
      memory: 4Gi
      cpu: "1"
    limits:
      memory: 8Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

dispatcher:
  replicas: 2
  resources:
    requests:
      memory: 2Gi
      cpu: "1"
    limits:
      memory: 4Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

plugins:
  yarax:
    enabled: true
  maco:
    enabled: true
  suricata:
    enabled: true
  tika:
    enabled: true
  capa:
    enabled: true
  virustotal:
    enabled: true
