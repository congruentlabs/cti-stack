ingress-nginx:
  controller:
    ingressClassResource:
      name: nginx
      default: true

    resources:
      requests:
        memory: 256Mi
        cpu: 200m
      limits:
        memory: 512Mi

    config:
      use-forwarded-headers: "true"
      compute-full-forwarded-for: "true"
      ## ISM-1139: TLS policy — TLS 1.2+ with ISM-approved cipher suites
      ssl-protocols: "TLSv1.2 TLSv1.3"
      ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
      ssl-prefer-server-ciphers: "true"
      ## Force HTTPS
      force-ssl-redirect: "true"
      ssl-redirect: "true"
      ## Hide server info
      server-tokens: "false"
      hide-headers: "X-Powered-By,Server"
      ## ISM-1369: HSTS
      hsts: "true"
      hsts-max-age: "31536000"
      hsts-include-subdomains: "true"
      hsts-preload: "true"
      ## ISM-1369: Security response headers
      add-headers: "cti-infra/cti-ingress-response-headers"

    ## ISM-0408: Classification banner + ISM-1369 headers via server-snippet
    addHeaders:
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "SAMEORIGIN"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=()"
      Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"

    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
        add:
          - NET_BIND_SERVICE

    metrics:
      enabled: true

## ISM-0408: Classification marking
classification: "PROTECTED"
classificationBanner: "This system is classified PROTECTED. Unauthorised access is prohibited. All activity is monitored and logged."

networkPolicy:
  enabled: true
