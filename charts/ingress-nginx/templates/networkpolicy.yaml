{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cti-ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
  policyTypes:
    - Ingress
    - Egress
  ingress:
    ## Allow external traffic (HTTP/HTTPS)
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
  egress:
    ## Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    ## Allow egress to all cti-* namespaces (backend services)
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: cti-stack
{{- end }}
