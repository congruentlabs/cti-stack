apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cluster.security.securityConfigSecret.name }}
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  config.yml: |
    {{- .Values.securityConfig.configYml | nindent 4 }}
  internal_users.yml: |
    {{- .Values.securityConfig.internalUsersYml | nindent 4 }}
  roles.yml: |
    {{- .Values.securityConfig.rolesYml | nindent 4 }}
  roles_mapping.yml: |
    {{- .Values.securityConfig.rolesMappingYml | nindent 4 }}
