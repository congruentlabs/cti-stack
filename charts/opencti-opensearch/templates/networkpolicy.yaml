{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.cluster.name }}
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      opensearch.org/opensearch-cluster: {{ .Values.cluster.name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    ## Allow from same namespace only
    - from:
        - podSelector: {}
      ports:
        - port: 9200
          protocol: TCP
        - port: 9300
          protocol: TCP
  egress:
    ## Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    ## Allow inter-node transport
    - to:
        - podSelector:
            matchLabels:
              opensearch.org/opensearch-cluster: {{ .Values.cluster.name }}
      ports:
        - port: 9300
          protocol: TCP
{{- end }}
