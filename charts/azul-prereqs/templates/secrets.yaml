## S3 / filestore credentials — matches upstream secrets.filestore
apiVersion: v1
kind: Secret
metadata:
  name: s3-keys
  labels:
    app.kubernetes.io/name: azul
    app.kubernetes.io/part-of: cti-stack
type: Opaque
stringData:
  accesskey: {{ .Values.secrets.s3.accessKey | quote }}
  secretkey: {{ .Values.secrets.s3.secretKey | quote }}
---
## Metastore credentials — matches upstream secrets.metastoreCreds
apiVersion: v1
kind: Secret
metadata:
  name: metastore-creds
  labels:
    app.kubernetes.io/name: azul
    app.kubernetes.io/part-of: cti-stack
type: Opaque
stringData:
  writer: {{ .Values.secrets.metastore.writerPassword | quote }}
  jwt_signing_secret: {{ .Values.secrets.metastore.jwtSigningSecret | quote }}
  opensearch_azul_security_password: {{ .Values.secrets.metastore.securityPassword | quote }}
---
## CA certificate ConfigMap — referenced by Azul CACertificateConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: azul-ca-cert
  labels:
    app.kubernetes.io/name: azul
    app.kubernetes.io/part-of: cti-stack
data:
  ca.crt: |
    {{ .Values.caCert | nindent 4 }}
