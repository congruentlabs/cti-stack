apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cluster.security.adminCredentialsSecret.name }}
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  username: {{ .Values.adminCredentials.username | quote }}
  password: {{ .Values.adminCredentials.password | quote }}
