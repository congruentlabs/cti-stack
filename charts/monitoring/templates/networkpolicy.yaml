{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cti-monitoring
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    ## Allow Prometheus scraping from all cti-* namespaces
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: cti-stack
      ports:
        - port: 9090
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 3100
          protocol: TCP
    ## Allow ingress controller traffic to Grafana
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cti-infra
      ports:
        - port: 3000
          protocol: TCP
  egress:
    ## Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    ## Allow Prometheus to scrape all cti-* namespaces
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: cti-stack
    ## Allow Grafana OIDC to Keycloak in cti-infra
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cti-infra
      ports:
        - port: 8080
          protocol: TCP
    ## Allow internal Loki/Promtail communication
    - to:
        - podSelector: {}
{{- end }}
