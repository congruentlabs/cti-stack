apiVersion: v2
name: monitoring
description: Monitoring stack for CTI (Prometheus, Grafana, Loki, Promtail)
version: 0.1.0
dependencies:
  - name: kube-prometheus-stack
    version: 67.4.0
    repository: https://prometheus-community.github.io/helm-charts
  - name: loki
    version: 6.24.0
    repository: https://grafana.github.io/helm-charts
  - name: promtail
    version: 6.16.6
    repository: https://grafana.github.io/helm-charts
    condition: promtail.enabled
