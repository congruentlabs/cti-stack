global:
  baseDomain: cti.local
  clusterIssuer: cti-ca-issuer

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          memory: 1Gi
          cpu: 500m
        limits:
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 256Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

  grafana:
    enabled: true
    adminPassword: CHANGE_ME_GRAFANA_ADMIN_PASSWORD
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: cti-ca-issuer
      hosts:
        - grafana.cti.local
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.cti.local
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
    grafana.ini:
      server:
        root_url: https://grafana.cti.local
      auth.generic_oauth:
        enabled: true
        name: Keycloak
        allow_sign_up: true
        client_id: grafana
        client_secret: CHANGE_ME_GRAFANA_OIDC_SECRET
        scopes: openid profile email roles
        auth_url: https://keycloak.cti.local/realms/cti/protocol/openid-connect/auth
        token_url: https://keycloak.cti.local/realms/cti/protocol/openid-connect/token
        api_url: https://keycloak.cti.local/realms/cti/protocol/openid-connect/userinfo
        role_attribute_path: contains(realm_access.roles[*], 'cti-admin') && 'Admin' || contains(realm_access.roles[*], 'cti-analyst') && 'Editor' || 'Viewer'

  nodeExporter:
    enabled: true

  kubeStateMetrics:
    enabled: true

loki:
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    limits_config:
      retention_period: 8760h
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

promtail:
  enabled: true
  config:
    clients:
      - url: http://cti-monitoring-loki:3100/loki/api/v1/push
    snippets:
      extraScrapeConfigs: |
        - job_name: kubernetes-audit
          static_configs:
            - targets:
                - localhost
              labels:
                job: kubernetes-audit
                __path__: /var/log/kubernetes/audit/*.log

networkPolicy:
  enabled: true
