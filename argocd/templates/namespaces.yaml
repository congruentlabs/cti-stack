{{- /*
  Wave -5: Create all namespaces before any workloads.
  ISM-1249: Pod Security Standards enforced on all namespaces.
*/ -}}
{{- $namespaces := list .Values.namespaces.infra .Values.namespaces.azul .Values.namespaces.opencti .Values.namespaces.mobsf .Values.namespaces.monitoring }}
{{- range $ns := $namespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: cti-stack
    {{- if $.Values.global.security.podSecurity }}
    {{- if eq $ns $.Values.namespaces.infra }}
    ## cti-infra uses baseline — operators (Strimzi, CNPG) may need elevated privileges
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    {{- else }}
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    {{- end }}
    {{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
{{- end }}
